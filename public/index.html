<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BTCJPY Dashboard</title>
  <script src="https://unpkg.com/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js"></script>
  <script src="https://cdn.plot.ly/plotly-gl3d-2.27.0.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0a0e17;
      color: #d1d4dc;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      overflow-x: hidden;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 16px;
      background: #131722;
      border-bottom: 1px solid #1e222d;
      flex-shrink: 0;
    }

    .header-left { display: flex; align-items: center; gap: 14px; }
    .pair-name { font-size: 18px; font-weight: 700; color: #fff; }
    .price-info { display: flex; align-items: center; gap: 10px; font-size: 12px; }
    .current-price { font-size: 16px; font-weight: 600; }
    .price-up { color: #26a69a; }
    .price-down { color: #ef5350; }
    .price-detail { color: #787b86; }
    .price-detail span { margin-left: 3px; }
    .controls { display: flex; gap: 6px; align-items: center; }

    .btn {
      padding: 4px 10px;
      border: 1px solid #2a2e39;
      background: transparent;
      color: #787b86;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
      transition: all 0.2s;
    }
    .btn:hover { background: #2a2e39; color: #d1d4dc; }
    .btn.active { background: #2962ff; color: #fff; border-color: #2962ff; }

    .main-layout {
      display: flex;
      flex: 1;
      min-height: 0;
    }

    .left-panel {
      width: 50%;
      display: flex;
      flex-direction: column;
      border-right: 2px solid #1e222d;
      overflow-y: auto;
    }

    .right-panel {
      width: 50%;
      overflow-y: auto;
      padding: 12px 16px;
      background: #0d1117;
    }

    .chart-section {
      position: relative;
      border-bottom: 1px solid #1e222d;
      flex-shrink: 0;
    }

    .chart-label {
      position: absolute;
      top: 4px; left: 8px;
      z-index: 10;
      font-size: 10px; font-weight: 600; color: #787b86;
      background: rgba(19, 23, 34, 0.85);
      padding: 2px 6px; border-radius: 3px;
    }

    .macd-cell {
      position: relative;
      border-bottom: 1px solid #1e222d;
      flex-shrink: 0;
    }

    /* ===== RIGHT PANEL ===== */
    .stats-section { margin-bottom: 14px; }
    .stats-title {
      font-size: 12px; font-weight: 700; color: #d1d4dc;
      padding: 6px 10px;
      background: #161b22;
      border: 1px solid #1e222d;
      border-bottom: none;
      border-radius: 6px 6px 0 0;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .stats-body {
      background: #131722;
      border: 1px solid #1e222d;
      border-radius: 0 0 6px 6px;
      padding: 10px;
    }


    /* TF Table */
    .tf-table { width: 100%; border-collapse: collapse; font-size: 11px; }
    .tf-table th {
      text-align: left; padding: 5px 6px; color: #787b86;
      font-weight: 600; border-bottom: 1px solid #1e222d;
      font-size: 10px; text-transform: uppercase;
    }
    .tf-table td { padding: 5px 6px; border-bottom: 1px solid #1a1e2a; }
    .tf-table tr:last-child td { border-bottom: none; }
    .tf-name { font-weight: 600; color: #d1d4dc; }

    .badge {
      display: inline-block; padding: 1px 6px;
      border-radius: 3px; font-size: 10px; font-weight: 600;
    }
    .badge-bull { background: rgba(38,166,154,0.15); color: #26a69a; }
    .badge-bear { background: rgba(239,83,80,0.15); color: #ef5350; }
    .badge-neutral { background: rgba(120,123,134,0.15); color: #787b86; }

    .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .stat-card {
      background: #161b22; border-radius: 5px;
      padding: 8px 10px; border: 1px solid #1e222d;
    }
    .stat-label { font-size: 10px; color: #787b86; text-transform: uppercase; }
    .stat-value { font-size: 14px; font-weight: 600; color: #d1d4dc; margin-top: 2px; }

    .momentum-row { display: flex; align-items: center; gap: 6px; padding: 4px 0; }
    .momentum-tf { width: 28px; font-size: 11px; font-weight: 600; color: #787b86; }
    .momentum-bars { flex: 1; display: flex; gap: 1px; height: 18px; align-items: flex-end; }
    .momentum-bar { flex: 1; min-width: 2px; border-radius: 1px 1px 0 0; }
    .momentum-val { width: 55px; text-align: right; font-size: 11px; font-weight: 600; }

    .loading-overlay {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(10, 14, 23, 0.95);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      z-index: 1000; transition: opacity 0.3s;
    }
    .loading-overlay.hidden { opacity: 0; pointer-events: none; }
    .spinner { width: 36px; height: 36px; border: 3px solid #2a2e39; border-top-color: #2962ff; border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text { margin-top: 12px; color: #787b86; font-size: 13px; }

    .error-banner { padding: 8px 16px; background: #3c1f1f; color: #ef5350; font-size: 12px; display: none; flex-shrink: 0; }

    .status-bar {
      padding: 4px 16px; background: #131722; border-top: 1px solid #1e222d;
      font-size: 10px; color: #787b86; display: flex; justify-content: space-between; flex-shrink: 0;
    }

    .filter-cb { font-size: 11px; color: #b0b4bc; cursor: pointer; user-select: none; display: flex; align-items: center; gap: 6px; }
.filter-cb input { accent-color: #2962ff; }
.filter-cb:hover { color: #d1d4dc; }

    .macd5m-table { width: 100%; border-collapse: collapse; margin-top: 4px; }
    .macd5m-table th, .macd5m-table td {
      border-bottom: 1px solid #1e222d;
      padding: 4px 6px;
      text-align: right;
      font-size: 11px;
    }
    .macd5m-table th:first-child, .macd5m-table td:first-child { text-align: left; }
    .macd5m-table th { color: #787b86; font-weight: 600; font-size: 10px; text-transform: uppercase; }
    .macd5m-table tr:last-child td { border-bottom: none; }

.right-panel::-webkit-scrollbar { width: 6px; }
    .right-panel::-webkit-scrollbar-track { background: #0d1117; }
    .right-panel::-webkit-scrollbar-thumb { background: #2a2e39; border-radius: 3px; }
    .left-panel::-webkit-scrollbar { width: 4px; }
    .left-panel::-webkit-scrollbar-track { background: #131722; }
    .left-panel::-webkit-scrollbar-thumb { background: #2a2e39; border-radius: 2px; }
  </style>
</head>
<body>

<div class="loading-overlay" id="loading">
  <div class="spinner"></div>
  <div class="loading-text">Đang tải dữ liệu BTCJPY...</div>
</div>
<div class="error-banner" id="errorBanner"></div>

<div class="header">
  <div class="header-left">
    <div class="pair-name">BTC/JPY</div>
    <div class="price-info">
      <span class="current-price" id="currentPrice">--</span>
      <span class="price-detail">O <span id="infoOpen">--</span></span>
      <span class="price-detail">H <span id="infoHigh">--</span></span>
      <span class="price-detail">L <span id="infoLow">--</span></span>
      <span class="price-detail">C <span id="infoClose">--</span></span>
      <span class="price-detail">Vol <span id="infoVol">--</span></span>
    </div>
  </div>
  <div class="controls">
    <button class="btn" data-limit="200">200</button>
    <button class="btn" data-limit="500">500</button>
    <button class="btn" data-limit="1000">1000</button>
    <button class="btn active" data-limit="2000">2000</button>
    <button class="btn" data-limit="10000">10000</button>
    <button class="btn" id="refreshBtn" title="Làm mới">&#8635; Refresh</button>
  </div>
</div>

<div class="main-layout">

  <div class="left-panel" id="leftPanel">
      <div class="chart-section" id="mainChartContainer">
        <div class="chart-label">OHLC + Volume</div>
        <div id="mainChart"></div>
      </div>
      <div class="macd-cell" id="macd5mContainer">
        <div class="chart-label">MACD 5m</div>
        <div id="macd5mChart"></div>
      </div>
      <div class="macd-cell" id="macd1hContainer">
        <div class="chart-label">MACD 1h</div>
        <div id="macd1hChart"></div>
      </div>
      <div class="macd-cell" id="macd4hContainer">
        <div class="chart-label">MACD 4h</div>
        <div id="macd4hChart"></div>
      </div>
      <div class="macd-cell" id="macd1dContainer">
        <div class="chart-label">MACD 1d</div>
        <div id="macd1dChart"></div>
      </div>
    </div>

    <div class="right-panel" id="rightPanel">

      <!-- Miền Histogram MACD 5m -->
      <div class="stats-section" id="macd5mRegionsSection">
        <div class="stats-title">Miền Histogram MACD 5m</div>
        <div class="stats-body">
          <div id="macd5mRegionsStat" style="margin-bottom:6px;font-size:12px;color:#787b86">Đang tải toàn bộ dữ liệu BTCJPY (~200.000 nến)...</div>
          <div class="macd5m-filters" style="margin-bottom:8px;display:flex;flex-wrap:wrap;gap:8px;align-items:center">
            <label class="filter-cb"><input type="checkbox" id="macd5mFilter1h" /> Chỉ miền nằm trong MACD 1h dương</label>
            <label class="filter-cb"><input type="checkbox" id="macd5mFilter4h" /> Chỉ miền nằm trong MACD 4h dương</label>
            <label class="filter-cb"><input type="checkbox" id="macd5mFilter1d" /> Chỉ miền nằm trong MACD 1d dương</label>
            <button type="button" class="btn" id="macd5mClearCrossFilter" style="margin-left:8px;font-size:11px">Xóa cross-filter</button>
          </div>
          <div class="macd5m-three-charts" style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px">
            <div id="macd5mRegionsChart" style="height:200px" data-dim="candles"></div>
            <div id="macd5mHighOpenChart" style="height:200px" data-dim="highOpen"></div>
            <div id="macd5mOpenLowChart" style="height:200px" data-dim="openLow"></div>
          </div>
          <div id="macd5mRegionsTable" style="margin-top:10px;font-size:11px;color:#d1d4dc"></div>
        </div>
      </div>

      <!-- 3D MACD Histogram (top) -->
      <div class="stats-section">
        <div class="stats-title">MACD Histogram 3D (200 nến gần nhất)
          <button class="btn" id="replayBtn" style="padding:2px 8px;font-size:11px">&#9654; Replay</button>
        </div>
        <div class="stats-body" style="padding:0;overflow:hidden;border-radius:0 0 6px 6px">
          <div id="hist3dChart" style="width:100%;height:520px"></div>
        </div>
      </div>

    </div>

</div>

<div class="status-bar">
  <span id="dataCount">--</span>
  <span id="lastUpdate">--</span>
  <span id="autoRefreshCountdown" style="color:#26a69a;margin-left:12px">⏳ 60s</span>
</div>

<script>
const { createChart, ColorType, CrosshairMode } = LightweightCharts;

const chartTheme = {
  layout: { background: { type: ColorType.Solid, color: '#131722' }, textColor: '#787b86' },
  grid: { vertLines: { color: '#1e222d' }, horzLines: { color: '#1e222d' } },
  crosshair: { mode: CrosshairMode.Normal },
  timeScale: { borderColor: '#1e222d', timeVisible: true, secondsVisible: false },
  rightPriceScale: { borderColor: '#1e222d' },
};

let mainChart, candleSeries, volumeSeries;
let macdCharts = {}, macdLineSeries = {}, macdSignalSeries = {}, macdHistSeries = {};
let currentLimit = 2000;
let rawData = [];
let replayTimer = null;
const FULL_DATASET_LIMIT = 250000;
let fullDatasetForRegions = null;
let fullRegionFetchStarted = false;

function getChartWidth() { return document.getElementById('leftPanel').clientWidth; }
function getMainChartHeight() { return Math.max(280, (window.innerHeight - 52) * 0.42); }
function getMacdChartHeight() { return Math.max(90, (window.innerHeight - 52) * 0.13); }

function initMainChart() {
  mainChart = createChart(document.getElementById('mainChart'), {
    ...chartTheme, width: getChartWidth(), height: getMainChartHeight(),
    localization: { priceFormatter: p => p.toLocaleString('ja-JP', { maximumFractionDigits: 0 }) },
  });
  candleSeries = mainChart.addCandlestickSeries({
    upColor: '#26a69a', downColor: '#ef5350',
    borderDownColor: '#ef5350', borderUpColor: '#26a69a',
    wickDownColor: '#ef5350', wickUpColor: '#26a69a',
  });
  volumeSeries = mainChart.addHistogramSeries({ priceFormat: { type: 'volume' }, priceScaleId: 'volume' });
  mainChart.priceScale('volume').applyOptions({ scaleMargins: { top: 0.82, bottom: 0 } });
}

function initMacdChart(id, container) {
  macdCharts[id] = createChart(container, {
    ...chartTheme, width: getChartWidth(), height: getMacdChartHeight(),
    localization: { priceFormatter: p => p.toFixed(2) },
  });
  macdLineSeries[id] = macdCharts[id].addLineSeries({ color: '#2962ff', lineWidth: 1.5, priceLineVisible: false, lastValueVisible: false });
  macdSignalSeries[id] = macdCharts[id].addLineSeries({ color: '#ff6d00', lineWidth: 1.5, priceLineVisible: false, lastValueVisible: false });
  macdHistSeries[id] = macdCharts[id].addHistogramSeries({ priceLineVisible: false, lastValueVisible: false });
}

function toTimestamp(d) { return Math.floor(new Date(d).getTime() / 1000); }
function fmt(n, d = 0) { return (n == null || isNaN(n)) ? '--' : Number(n).toLocaleString('ja-JP', { maximumFractionDigits: d }); }
function fmtSigned(n, d = 2) { if (n == null || isNaN(n)) return '--'; const v = Number(n); return (v >= 0 ? '+' : '') + v.toFixed(d); }

// ==========================================
//  3D HISTOGRAM
// ==========================================

function update3DChart(data, sliceOverride) {
  const slice = sliceOverride || data.slice(-200);
  const tfs = ['5m', '1h', '4h', '1d'];

  const zSurface = [];
  const colorSurface = [];

  tfs.forEach((tf) => {
    const zRow = [], cRow = [];
    let prev = 0;
    for (let xi = 0; xi < slice.length; xi++) {
      const h = Number(slice[xi][`hist_${tf}`]) || 0;
      let cv;
      if (h >= 0) { cv = h >= prev ? 1 : 0.4; }
      else { cv = h <= prev ? -1 : -0.4; }
      zRow.push(h);
      cRow.push(cv);
      prev = h;
    }
    zSurface.push(zRow);
    colorSurface.push(cRow);
  });

  const mx = [], my = [], mz = [], mc = [];
  tfs.forEach((tf, ti) => {
    let prev = 0;
    for (let xi = 0; xi < slice.length; xi++) {
      const h = Number(slice[xi][`hist_${tf}`]) || 0;
      let color;
      if (h >= 0) { color = h >= prev ? '#26a69a' : '#a8dbd5'; }
      else { color = h <= prev ? '#ef5350' : '#f0a8a6'; }
      prev = h;
      mx.push(xi); my.push(ti); mz.push(h); mc.push(color);
    }
  });

  const timeLabels = slice.map(r => {
    if (!r.open_time) return '';
    const d = new Date(r.open_time);
    return d.toLocaleString('vi-VN', { day:'2-digit', month:'2-digit', hour:'2-digit', minute:'2-digit' });
  });
  const tickStep = Math.max(1, Math.floor(slice.length / 10));
  const tickVals = [], tickTexts = [];
  for (let i = 0; i < slice.length; i += tickStep) {
    tickVals.push(i);
    tickTexts.push(timeLabels[i]);
  }

  const traces = [
    {
      type: 'surface',
      z: zSurface,
      surfacecolor: colorSurface,
      x: Array.from({ length: slice.length }, (_, i) => i),
      y: [0, 1, 2, 3],
      colorscale: [
        [0, '#ef5350'],
        [0.25, '#f0a8a6'],
        [0.5, '#2a2e39'],
        [0.75, '#a8dbd5'],
        [1, '#26a69a'],
      ],
      cmin: -1, cmax: 1,
      showscale: false,
      opacity: 0.78,
      hoverinfo: 'z',
      lighting: { ambient: 0.9, diffuse: 0.3, specular: 0.15, roughness: 0.6 },
      contours: {
        x: { show: true, color: 'rgba(255,255,255,0.05)', width: 1 },
        y: { show: true, color: 'rgba(255,255,255,0.08)', width: 1 },
        z: { show: false },
      },
    },
    {
      type: 'scatter3d',
      mode: 'markers',
      x: mx, y: my, z: mz,
      marker: { size: 2.5, color: mc, opacity: 0.95 },
      showlegend: false,
      hoverinfo: 'z',
    },
  ];

  const layout = {
    paper_bgcolor: '#131722',
    margin: { l: 0, r: 0, t: 0, b: 0 },
    scene: {
      bgcolor: '#0d1117',
      xaxis: {
        title: { text: 'Time', font: { color: '#e0e3eb', size: 11 } },
        color: '#e0e3eb', tickfont: { color: '#b0b4bc', size: 9 },
        gridcolor: '#2a2e39', zerolinecolor: '#2a2e39',
        showticklabels: true,
        tickvals: tickVals, ticktext: tickTexts,
        tickangle: -30,
      },
      yaxis: {
        title: { text: '', font: { color: '#e0e3eb' } },
        color: '#e0e3eb', tickfont: { color: '#e0e3eb', size: 11 },
        gridcolor: '#2a2e39', zerolinecolor: '#2a2e39',
        tickvals: [0, 1, 2, 3], ticktext: ['5M', '1H', '4H', '1D'],
      },
      zaxis: {
        title: { text: 'Histogram', font: { color: '#e0e3eb', size: 11 } },
        color: '#e0e3eb', tickfont: { color: '#b0b4bc', size: 10 },
        gridcolor: '#2a2e39', zerolinecolor: '#555',
      },
      aspectratio: { x: 1, y: 2, z: 0.8 },
      camera: { eye: { x: 1.6, y: -1.8, z: 0.9 } },
    },
    font: { color: '#e0e3eb', size: 11 },
  };

  Plotly.react('hist3dChart', traces, layout, { responsive: true, displayModeBar: false });
}

function update3DData(slice) {
  const tfs = ['5m', '1h', '4h', '1d'];
  const zSurface = [], colorSurface = [];
  const mx = [], my = [], mz = [], mc = [];

  tfs.forEach((tf, ti) => {
    const zRow = [], cRow = [];
    let prev = 0;
    for (let xi = 0; xi < slice.length; xi++) {
      const h = Number(slice[xi][`hist_${tf}`]) || 0;
      let cv;
      if (h >= 0) { cv = h >= prev ? 1 : 0.4; }
      else { cv = h <= prev ? -1 : -0.4; }
      zRow.push(h); cRow.push(cv);

      let color;
      if (h >= 0) { color = h >= prev ? '#26a69a' : '#a8dbd5'; }
      else { color = h <= prev ? '#ef5350' : '#f0a8a6'; }
      mx.push(xi); my.push(ti); mz.push(h); mc.push(color);
      prev = h;
    }
    zSurface.push(zRow); colorSurface.push(cRow);
  });

  return { zSurface, colorSurface, mx, my, mz, mc };
}

const REPLAY_SPEED = 80;

function toggleReplay() {
  const btn = document.getElementById('replayBtn');
  if (replayTimer) {
    cancelAnimationFrame(replayTimer);
    replayTimer = null;
    btn.innerHTML = '&#9654; Replay';
    update3DChart(rawData);
    return;
  }
  const allData = rawData;
  const totalLen = allData.length;
  const windowSize = 200;
  let endPos = windowSize;
  btn.innerHTML = '&#9724; Dừng';

  let lastTime = 0;
  function step(ts) {
    if (!replayTimer) return;
    if (ts - lastTime < REPLAY_SPEED) {
      replayTimer = requestAnimationFrame(step);
      return;
    }
    lastTime = ts;
    endPos++;
    if (endPos >= totalLen) {
      replayTimer = null;
      btn.innerHTML = '&#9654; Replay';
      update3DChart(rawData);
      return;
    }
    const startPos = Math.max(0, endPos - windowSize);
    const slice = allData.slice(startPos, endPos);
    const d = update3DData(slice);

    Plotly.restyle('hist3dChart', {
      z: [d.zSurface],
      surfacecolor: [d.colorSurface],
    }, [0]);
    Plotly.restyle('hist3dChart', {
      x: [d.mx], y: [d.my], z: [d.mz],
      'marker.color': [d.mc],
    }, [1]);

    replayTimer = requestAnimationFrame(step);
  }

  update3DChart(rawData, allData.slice(0, endPos));
  replayTimer = requestAnimationFrame(step);
}

// ==========================================
//  STATS
// ==========================================

/** Trả về bản sao data với hist_1h, hist_4h, hist_1d được fill theo chu kỳ:
 *  trong mỗi bar 1h/4h/1d, mọi nến 5m dùng chung giá trị hist của nến đóng bar (nến cuối chu kỳ).
 *  Giúp định nghĩa miền dương 1h/4h/1d giống 5m: cùng logic "đoạn liên tiếp hist > 0".
 */
function fillHistForHigherTF(data) {
  if (!data || data.length === 0) return data;
  const PERIOD = { '1h': 3600, '4h': 3600 * 4, '1d': 3600 * 24 };
  const out = data.map(r => ({ ...r }));
  for (const tf of ['1h', '4h', '1d']) {
    const periodSec = PERIOD[tf];
    const key = `hist_${tf}`;
    let i = 0;
    while (i < out.length) {
      const t0 = Math.floor(toTimestamp(out[i].open_time) / periodSec) * periodSec;
      let j = i;
      while (j < out.length && Math.floor(toTimestamp(out[j].open_time) / periodSec) * periodSec === t0) j++;
      const lastIdx = j - 1;
      const fillVal = Number(out[lastIdx][key]) || 0;
      for (let k = i; k < j; k++) out[k][key] = fillVal;
      i = j;
    }
  }
  return out;
}

function countPositiveRegions(data, histKey) {
  const useData = (histKey !== 'hist_5m') ? fillHistForHigherTF(data) : data;
  let count = 0, inPositive = false;
  for (const r of useData) {
    const h = Number(r[histKey]) || 0;
    if (h > 0) {
      if (!inPositive) { count++; inPositive = true; }
    } else {
      inPositive = false;
    }
  }
  return count;
}

function getRegionsForTF(data, histKey) {
  const useData = (histKey !== 'hist_5m') ? fillHistForHigherTF(data) : data;
  const regions = [];
  let current = null;
  for (const r of useData) {
    const h = Number(r[histKey]) || 0;
    if (h > 0) {
      if (!current) current = [];
      current.push(r);
    } else {
      if (current) { regions.push(current); current = null; }
    }
  }
  if (current) regions.push(current);
  return regions;
}

/** Trả về các miền 5m dưới dạng mảng chỉ số (để lọc theo 1h/4h/1d). */
function getRegionsForTFIndices(data, histKey) {
  const useData = (histKey !== 'hist_5m') ? fillHistForHigherTF(data) : data;
  const regions = [];
  let current = null;
  for (let i = 0; i < useData.length; i++) {
    const h = Number(useData[i][histKey]) || 0;
    if (h > 0) {
      if (!current) current = [];
      current.push(i);
    } else {
      if (current) { regions.push(current); current = null; }
    }
  }
  if (current) regions.push(current);
  return regions;
}

function buildHistogramBucketsCandles(regions) {
  const buckets = ['1-2', '3-5', '6-10', '11-20', '21-50', '51-100', '100+'];
  const bounds = [1, 3, 6, 11, 21, 51, 101];
  const counts = new Array(buckets.length).fill(0);
  for (const reg of regions) {
    const n = reg.length;
    let i = bounds.length - 1;
    while (i >= 0 && n < bounds[i]) i--;
    counts[i >= 0 ? i : 0]++;
  }
  return { labels: buckets, values: counts };
}

function buildHistogramBucketsValues(values, numBins, minCount = 5) {
  if (values.length === 0) return { labels: [], values: [], ranges: [] };
  const sorted = [...values].sort((a, b) => a - b);
  const p2 = sorted[Math.floor(sorted.length * 0.02)];
  const p98 = sorted[Math.ceil(sorted.length * 0.98) - 1];
  const clipped = values.filter(v => v >= p2 && v <= p98);
  if (clipped.length === 0) return { labels: [], values: [], ranges: [] };
  const min = Math.min(...clipped), max = Math.max(...clipped);
  const step = (max - min) / numBins || 1;
  const counts = new Array(numBins).fill(0);
  const labels = [], ranges = [];
  for (let i = 0; i < numBins; i++) {
    const a = min + i * step, b = i === numBins - 1 ? max + 0.01 : min + (i + 1) * step;
    labels.push(step >= 1 ? `${Math.round(a)}–${Math.round(b)}` : `${a.toFixed(0)}–${b.toFixed(0)}`);
    ranges.push([a, b]);
  }
  for (const v of clipped) {
    let i = Math.min(numBins - 1, Math.floor((v - min) / step));
    if (i < 0) i = 0;
    counts[i]++;
  }
  const fLabels = [], fValues = [], fRanges = [];
  for (let i = 0; i < labels.length; i++) {
    if (counts[i] >= minCount) { fLabels.push(labels[i]); fValues.push(counts[i]); fRanges.push(ranges[i]); }
  }
  return { labels: fLabels, values: fValues, ranges: fRanges };
}

/** Chia bin cho dữ liệu % (highOpen/openLow): min=0, max=p99, nhãn rõ ràng dạng "0.0–0.1%". */
function buildHistogramBucketsPercent(values, numBins) {
  if (values.length === 0) return { labels: [], values: [], ranges: [] };
  const sorted = [...values].filter(v => v >= 0).sort((a, b) => a - b);
  if (sorted.length === 0) return { labels: [], values: [], ranges: [] };
  const max = sorted[Math.min(sorted.length - 1, Math.ceil(sorted.length * 0.99) - 1)] || 0;
  const min = 0;
  const span = Math.max(max - min, 0.01);
  const step = span / numBins;
  const labels = [], ranges = [];
  for (let i = 0; i < numBins; i++) {
    const a = min + i * step, b = i === numBins - 1 ? max + 0.001 : min + (i + 1) * step;
    const fmt = (x) => (x >= 1 ? x.toFixed(1) : x.toFixed(2));
    labels.push(`${fmt(a)}–${fmt(b)}%`);
    ranges.push([a, b]);
  }
  const counts = new Array(numBins).fill(0);
  for (const v of values) {
    if (v < 0) { counts[0]++; continue; }
    let i = Math.min(numBins - 1, Math.floor((v - min) / step));
    if (i < 0) i = 0;
    counts[i]++;
  }
  return { labels, values: counts, ranges };
}

const _regionMeta = {};
const _activeFilter = {};
const NUM_BINS = 20;

function regionDarkLayout() {
  return {
    paper_bgcolor: '#131722',
    plot_bgcolor: '#161b22',
    font: { color: '#e0e3eb', size: 10 },
    margin: { t: 28, b: 28, l: 40, r: 12 },
    xaxis: { color: '#b0b4bc', gridcolor: '#2a2e39', tickangle: -45 },
    yaxis: { color: '#b0b4bc', gridcolor: '#2a2e39' },
    bargap: 0.08,
    showlegend: false,
  };
}

function buildRegionMeta(regions) {
  return regions.map(r => {
    const firstOpen = Number(r[0].open) || 0;
    const maxHigh = Math.max(...r.map(x => Number(x.high) || 0));
    const minLow = Math.min(...r.map(x => Number(x.low) || 0));
    return { region: r, count: r.length, highOpen: maxHigh - firstOpen, openLow: firstOpen - minLow };
  });
}

function renderAllThreeCharts(tf, meta, source, filterLabel) {
  const dl = regionDarkLayout();
  const suffix = filterLabel ? ` [${filterLabel}]` : '';
  const ACTIVE = '#ffab00', DIM_BLUE = 'rgba(41,98,255,0.15)', DIM_GREEN = 'rgba(38,166,154,0.15)', DIM_RED = 'rgba(239,83,80,0.15)';

  const h1 = buildHistogramBucketsValues(meta.map(m => m.count), NUM_BINS, 0);
  const h2 = buildHistogramBucketsValues(meta.map(m => m.highOpen), NUM_BINS, 0);
  const h3 = buildHistogramBucketsValues(meta.map(m => m.openLow), NUM_BINS, 0);

  const c1colors = source === 'candles'
    ? h1.labels.map(l => l === filterLabel ? ACTIVE : DIM_BLUE)
    : new Array(h1.labels.length).fill('#2962ff');
  const c2colors = source === 'highOpen'
    ? h2.labels.map(l => l === filterLabel ? ACTIVE : DIM_GREEN)
    : new Array(h2.labels.length).fill('#26a69a');
  const c3colors = source === 'openLow'
    ? h3.labels.map(l => l === filterLabel ? ACTIVE : DIM_RED)
    : new Array(h3.labels.length).fill('#ef5350');

  const titleCandles = source === 'candles' ? `Số nến / miền ▸ ${filterLabel}` : (source ? `Số nến / miền${suffix}` : 'Số nến / miền');
  const titleHO = source === 'highOpen' ? `High − Open ▸ ${filterLabel}` : (source ? `High − Open${suffix}` : 'High − Open');
  const titleOL = source === 'openLow' ? `Open − Low ▸ ${filterLabel}` : (source ? `Open − Low${suffix}` : 'Open − Low');

  Plotly.react(`regionCharts_${tf}_candles`, [{
    type: 'bar', x: h1.labels, y: h1.values, marker: { color: c1colors },
  }], { ...dl, title: { text: titleCandles, font: { size: 11 } } }, { responsive: true, displayModeBar: false });

  Plotly.react(`regionCharts_${tf}_highOpen`, [{
    type: 'bar', x: h2.labels, y: h2.values, marker: { color: c2colors },
  }], { ...dl, title: { text: titleHO, font: { size: 11 } } }, { responsive: true, displayModeBar: false });

  Plotly.react(`regionCharts_${tf}_openLow`, [{
    type: 'bar', x: h3.labels, y: h3.values, marker: { color: c3colors },
  }], { ...dl, title: { text: titleOL, font: { size: 11 } } }, { responsive: true, displayModeBar: false });

  return { h1, h2, h3 };
}

function applyFilter(tf, source, clickedLabel) {
  const allMeta = _regionMeta[tf];
  if (!allMeta) return;
  const prev = _activeFilter[tf];

  if (prev && prev.source === source && prev.label === clickedLabel) {
    _activeFilter[tf] = null;
    renderAllThreeCharts(tf, allMeta, null, null);
    bindAllClickHandlers(tf);
    return;
  }

  const keyMap = { candles: 'count', highOpen: 'highOpen', openLow: 'openLow' };
  const key = keyMap[source];
  const allVals = allMeta.map(m => m[key]);
  const hist = buildHistogramBucketsValues(allVals, NUM_BINS, 0);
  const idx = hist.labels.indexOf(clickedLabel);
  if (idx < 0) return;
  const [rLo, rHi] = hist.ranges[idx];
  const filtered = allMeta.filter(m => m[key] >= rLo && m[key] < rHi);

  _activeFilter[tf] = { source, label: clickedLabel };
  renderAllThreeCharts(tf, filtered, source, clickedLabel);
  bindAllClickHandlers(tf);
}

function bindAllClickHandlers(tf) {
  ['candles', 'highOpen', 'openLow'].forEach(chartType => {
    const el = document.getElementById(`regionCharts_${tf}_${chartType}`);
    if (!el) return;
    el.removeAllListeners && el.removeAllListeners('plotly_click');
    el.on('plotly_click', function(ev) {
      if (!ev || !ev.points || ev.points.length === 0) return;
      applyFilter(tf, chartType, ev.points[0].x);
    });
  });
}

function renderRegionChartsForTF(tf, data) {
  const histKey = `hist_${tf}`;
  const regions = getRegionsForTF(data, histKey);
  if (regions.length === 0) return;

  _regionMeta[tf] = buildRegionMeta(regions);
  _activeFilter[tf] = null;

  renderAllThreeCharts(tf, _regionMeta[tf], null, null);
  bindAllClickHandlers(tf);
}

function toggleRegionRow(tf) {
  const row = document.getElementById(`expand_${tf}`);
  const arrow = document.getElementById(`arrow_${tf}`);
  if (!row || !arrow) return;
  const isHidden = row.style.display === 'none';
  row.style.display = isHidden ? 'table-row' : 'none';
  arrow.textContent = isHidden ? '▼' : '▶';
  if (isHidden && fullDatasetForRegions) {
    const container = document.getElementById(`regionCharts_${tf}_candles`);
    if (container && !container.hasChildNodes()) {

      setTimeout(() => ['candles', 'highOpen', 'openLow'].forEach(s => Plotly.Plots.resize(`regionCharts_${tf}_${s}`)), 50);
    }
  }
}

const MACD5M_REGION_BINS = 15;

let macd5mFullMeta = [];
let macd5mBinRanges = { candles: null, highOpen: null, openLow: null };
let macd5mActiveCrossFilter = { candles: null, highOpen: null, openLow: null };

function getMacd5mRegionFilters() {
  return {
    '1h': document.getElementById('macd5mFilter1h')?.checked ?? false,
    '4h': document.getElementById('macd5mFilter4h')?.checked ?? false,
    '1d': document.getElementById('macd5mFilter1d')?.checked ?? false,
  };
}

/** Đếm values rơi vào từng bin [a,b). Giá trị ngoài khoảng gộp vào bin cuối. */
function countInBins(values, ranges) {
  if (!ranges.length) return [];
  const counts = ranges.map(([a, b]) => 0);
  for (const v of values) {
    let i = ranges.findIndex(([a, b]) => v >= a && v < b);
    if (i < 0) i = ranges.length - 1;
    counts[i]++;
  }
  return counts;
}

/** Build meta { count, highOpen, openLow } từ regions (mảng chỉ số) và data. highOpen/openLow là %: (high-open)/open*100, (open-low)/open*100. */
function buildMacd5mRegionMeta(data, regionIndices) {
  return regionIndices.map(idx => {
    const firstOpen = Number(data[idx[0]].open) || 1;
    let maxHigh = -Infinity, minLow = Infinity;
    for (const i of idx) {
      const h = Number(data[i].high) || 0, l = Number(data[i].low) || 0;
      if (h > maxHigh) maxHigh = h;
      if (l < minLow) minLow = l;
    }
    const highOpenPct = firstOpen ? (100 * (maxHigh - firstOpen) / firstOpen) : 0;
    const openLowPct = firstOpen ? (100 * (firstOpen - minLow) / firstOpen) : 0;
    return { count: idx.length, highOpen: highOpenPct, openLow: openLowPct };
  });
}

function getFilteredMacd5mMeta() {
  if (macd5mFullMeta.length === 0) return [];
  let list = macd5mFullMeta;
  const f = macd5mActiveCrossFilter;
  if (f.candles) list = list.filter(m => m.count >= f.candles[0] && m.count < f.candles[1]);
  if (f.highOpen) list = list.filter(m => m.highOpen >= f.highOpen[0] && m.highOpen < f.highOpen[1]);
  if (f.openLow) list = list.filter(m => m.openLow >= f.openLow[0] && m.openLow < f.openLow[1]);
  return list;
}

function renderMacd5mTable(filteredMeta) {
  const container = document.getElementById('macd5mRegionsTable');
  if (!container) return;
  if (!filteredMeta || filteredMeta.length === 0) {
    container.innerHTML = '<span style="color:#787b86">Không có dữ liệu cho bảng.</span>';
    return;
  }

  // Gom theo đúng số nến dương/miền (1,2,3,...) thay vì theo bin của chart
  const groups = new Map();
  filteredMeta.forEach(m => {
    const k = m.count;
    if (!groups.has(k)) {
      groups.set(k, { count: k, n: 0, sumHO: 0, sumOL: 0 });
    }
    const g = groups.get(k);
    g.n += 1;
    g.sumHO += m.highOpen;
    g.sumOL += m.openLow;
  });

  const sorted = Array.from(groups.values()).sort((a, b) => a.count - b.count);

  let rows = '';
  sorted.forEach(g => {
    const avgHighOpen = g.sumHO / g.n;
    const avgOpenLow = g.sumOL / g.n;
    const rrPerRow = avgOpenLow > 0 ? (avgHighOpen / avgOpenLow) : null;
    rows += `<tr>
      <td>${g.count}</td>
      <td>${g.n.toLocaleString('vi-VN')}</td>
      <td>${avgHighOpen.toFixed(2)}%</td>
      <td>${avgOpenLow.toFixed(2)}%</td>
      <td>${rrPerRow == null ? '--' : rrPerRow.toFixed(2)}</td>
    </tr>`;
  });

  if (!rows) {
    container.innerHTML = '<span style="color:#787b86">Không có dữ liệu cho bảng.</span>';
    return;
  }

  const totalRegions = filteredMeta.length;
  const expectedHighOpen = filteredMeta.reduce((s, m) => s + m.highOpen, 0) / totalRegions;
  const expectedOpenLow = filteredMeta.reduce((s, m) => s + m.openLow, 0) / totalRegions;
  const rr = expectedOpenLow > 0 ? (expectedHighOpen / expectedOpenLow) : null;

  container.innerHTML = `
    <table class="macd5m-table">
      <thead>
        <tr>
          <th>Số nến dương / miền</th>
          <th>Số miền</th>
          <th>Kỳ vọng (High−Open)/Open %</th>
          <th>Kỳ vọng (Open−Low)/Open %</th>
          <th>RR</th>
        </tr>
      </thead>
      <tbody>
        ${rows}
        <tr>
          <td colspan="4" style="text-align:left;font-weight:600;color:#b0b4bc">
            Hệ số Risk-Reward = Kỳ vọng (High−Open)/Open % / Kỳ vọng (Open−Low)/Open %
          </td>
          <td style="font-weight:700;color:#ffab00">${rr == null ? '--' : rr.toFixed(2)}</td>
        </tr>
      </tbody>
    </table>
  `;
}

function renderMacd5mThreeCharts() {
  const elStat = document.getElementById('macd5mRegionsStat');
  const filteredMeta = getFilteredMacd5mMeta();
  const dims = [
    { id: 'macd5mRegionsChart', key: 'candles', title: 'Số nến dương / miền', getVal: m => m.count },
    { id: 'macd5mHighOpenChart', key: 'highOpen', title: '(High − Open) / Open %', getVal: m => m.highOpen },
    { id: 'macd5mOpenLowChart', key: 'openLow', title: '(Open − Low) / Open %', getVal: m => m.openLow },
  ];
  const ACTIVE = '#ffab00', NORMAL = '#2962ff', DIM = 'rgba(41,98,255,0.25)';
  const dl = regionDarkLayout();

  const crossEl = document.getElementById('macd5mCrossFilterStat');
  if (crossEl) {
    const total = macd5mFullMeta.length;
    crossEl.textContent = (filteredMeta.length < total) ? ` (đang xem ${filteredMeta.length.toLocaleString('vi-VN')} / ${total.toLocaleString('vi-VN')} miền)` : '';
  }

  dims.forEach(({ id, key, title, getVal }) => {
    const br = macd5mBinRanges[key];
    const el = document.getElementById(id);
    if (!el || !br || !br.labels.length) return;
    const values = filteredMeta.map(getVal);
    const counts = countInBins(values, br.ranges);
    const total = counts.reduce((s, c) => s + c, 0);
    let expectedStr = '';
    if (total > 0) {
      const weightedSum = br.ranges.reduce((s, r, i) => s + ((r[0] + r[1]) / 2) * counts[i], 0);
      const expected = weightedSum / total;
      expectedStr = key === 'candles'
        ? ` — Kỳ vọng: ${expected.toFixed(1)}`
        : ` — Kỳ vọng: ${expected.toFixed(2)}%`;
    }
    const activeRange = macd5mActiveCrossFilter[key];
    const colors = br.ranges.map((r, i) => {
      if (!activeRange) return NORMAL;
      const [a, b] = r;
      if (activeRange[0] === a && activeRange[1] === b) return ACTIVE;
      return DIM;
    });
    Plotly.react(id, [{
      type: 'bar',
      x: br.labels,
      y: counts,
      marker: { color: colors },
    }], {
      ...dl,
      title: { text: title + expectedStr, font: { size: 11 } },
      xaxis: { ...dl.xaxis, title: { text: key === 'candles' ? 'Số nến' : '%' } },
      yaxis: { ...dl.yaxis, title: { text: 'Số miền' } },
    }, { responsive: true, displayModeBar: false });
  });

  renderMacd5mTable(filteredMeta);
}

function updateMacd5mRegionsUI(data) {
  const elStat = document.getElementById('macd5mRegionsStat');
  const elChart = document.getElementById('macd5mRegionsChart');
  if (!elStat || !elChart) return;
  if (!data || data.length === 0) {
    elStat.textContent = 'Chưa có dữ liệu.';
    macd5mFullMeta = [];
    macd5mBinRanges = { candles: null, highOpen: null, openLow: null };
    return;
  }
  const filters = getMacd5mRegionFilters();
  let regions = getRegionsForTFIndices(data, 'hist_5m');

  if (filters['1h'] || filters['4h'] || filters['1d']) {
    const filled = fillHistForHigherTF(data);
    if (filters['1h']) regions = regions.filter(idx => idx.every(i => Number(filled[i].hist_1h) > 0));
    if (filters['4h']) regions = regions.filter(idx => idx.every(i => Number(filled[i].hist_4h) > 0));
    if (filters['1d']) regions = regions.filter(idx => idx.every(i => Number(filled[i].hist_1d) > 0));
  }

  const count = regions.length;
  macd5mFullMeta = buildMacd5mRegionMeta(data, regions);
  const n = data.length.toLocaleString('vi-VN');
  const filterLabel = [];
  if (filters['1h']) filterLabel.push('1h dương');
  if (filters['4h']) filterLabel.push('4h dương');
  if (filters['1d']) filterLabel.push('1d dương');
  const filterSuffix = filterLabel.length > 0 ? ` <span style="color:#787b86">(lọc: ${filterLabel.join(', ')})</span>` : '';
  elStat.innerHTML = `Toàn bộ tập dữ liệu BTCJPY: <strong style="color:#d1d4dc">${n}</strong> nến, có <strong style="color:#26a69a">${count.toLocaleString('vi-VN')}</strong> miền histogram MACD 5m dương.${filterSuffix}<span id="macd5mCrossFilterStat"></span>`;

  if (macd5mFullMeta.length === 0) {
    ['macd5mRegionsChart', 'macd5mHighOpenChart', 'macd5mOpenLowChart'].forEach(id => { const e = document.getElementById(id); if (e) e.innerHTML = ''; });
    return;
  }

  macd5mActiveCrossFilter = { candles: null, highOpen: null, openLow: null };
  const cVals = macd5mFullMeta.map(m => m.count);
  const hVals = macd5mFullMeta.map(m => m.highOpen);
  const lVals = macd5mFullMeta.map(m => m.openLow);
  macd5mBinRanges = {
    candles: buildHistogramBucketsValues(cVals, MACD5M_REGION_BINS, 0),
    highOpen: buildHistogramBucketsPercent(hVals, MACD5M_REGION_BINS),
    openLow: buildHistogramBucketsPercent(lVals, MACD5M_REGION_BINS),
  };
  renderMacd5mThreeCharts();
}

function applyMacd5mCrossFilter(dim, range) {
  const prev = macd5mActiveCrossFilter[dim];
  if (prev && prev[0] === range[0] && prev[1] === range[1]) {
    macd5mActiveCrossFilter[dim] = null;
  } else {
    macd5mActiveCrossFilter[dim] = range;
  }
  renderMacd5mThreeCharts();
}

function bindMacd5mRegionFilterHandlers() {
  ['macd5mFilter1h', 'macd5mFilter4h', 'macd5mFilter1d'].forEach(id => {
    const el = document.getElementById(id);
    if (!el || el.dataset.bound) return;
    el.dataset.bound = '1';
    el.addEventListener('change', () => {
      if (fullDatasetForRegions) updateMacd5mRegionsUI(fullDatasetForRegions);
    });
  });
  const clearBtn = document.getElementById('macd5mClearCrossFilter');
  if (clearBtn && !clearBtn.dataset.bound) {
    clearBtn.dataset.bound = '1';
    clearBtn.addEventListener('click', () => {
      macd5mActiveCrossFilter = { candles: null, highOpen: null, openLow: null };
      renderMacd5mThreeCharts();
    });
  }
  ['macd5mRegionsChart', 'macd5mHighOpenChart', 'macd5mOpenLowChart'].forEach(id => {
    const el = document.getElementById(id);
    if (!el || el.dataset.clickBound) return;
    el.dataset.clickBound = '1';
    el.on('plotly_click', function(ev) {
      if (!ev?.points?.length || !macd5mBinRanges?.candles) return;
      const dim = el.dataset.dim;
      const br = macd5mBinRanges[dim];
      if (!br || !br.ranges) return;
      const pointIndex = ev.points[0].pointIndex;
      if (pointIndex >= br.ranges.length) return;
      applyMacd5mCrossFilter(dim, br.ranges[pointIndex]);
    });
  });
}

function computeStats(data) {
  if (!data || data.length < 2) return;
  update3DChart(data);
}

// ==========================================
//  CHART DATA
// ==========================================

function updateCharts(data) {
  rawData = data;
  const candles = [], volumes = [];
  const macd = { '5m': [], '1h': [], '4h': [], '1d': [] };
  const macdSignal = { '5m': [], '1h': [], '4h': [], '1d': [] };
  const macdHist = { '5m': [], '1h': [], '4h': [], '1d': [] };

  const prevHist = { '5m': 0, '1h': 0, '4h': 0, '1d': 0 };

  for (const row of data) {
    if (!row.open_time) continue;
    const time = toTimestamp(row.open_time);
    candles.push({ time, open: Number(row.open), high: Number(row.high), low: Number(row.low), close: Number(row.close) });
    const v = Number(row.volume) || 0;
    const up = Number(row.close) >= Number(row.open);
    volumes.push({ time, value: v, color: up ? 'rgba(38,166,154,0.4)' : 'rgba(239,83,80,0.4)' });
    ['5m', '1h', '4h', '1d'].forEach(tf => {
      const m = Number(row[`macd_${tf}`]), s = Number(row[`signal_${tf}`]), h = Number(row[`hist_${tf}`]);
      if (!isNaN(m)) macd[tf].push({ time, value: m });
      if (!isNaN(s)) macdSignal[tf].push({ time, value: s });
      if (!isNaN(h)) {
        let color;
        if (h >= 0) {
          color = h >= prevHist[tf] ? '#26a69a' : '#a8dbd5';
        } else {
          color = h <= prevHist[tf] ? '#ef5350' : '#f0a8a6';
        }
        macdHist[tf].push({ time, value: h, color });
        prevHist[tf] = h;
      }
    });
  }

  candleSeries.setData(candles);
  volumeSeries.setData(volumes);
  ['5m', '1h', '4h', '1d'].forEach(tf => {
    macdLineSeries[tf].setData(macd[tf]);
    macdSignalSeries[tf].setData(macdSignal[tf]);
    macdHistSeries[tf].setData(macdHist[tf]);
  });

  if (data.length > 0) {
    const last = data[data.length - 1];
    const up = Number(last.close) >= Number(last.open);
    const el = document.getElementById('currentPrice');
    el.textContent = fmt(last.close); el.className = 'current-price ' + (up ? 'price-up' : 'price-down');
    document.getElementById('infoOpen').textContent = fmt(last.open);
    document.getElementById('infoHigh').textContent = fmt(last.high);
    document.getElementById('infoLow').textContent = fmt(last.low);
    document.getElementById('infoClose').textContent = fmt(last.close);
    document.getElementById('infoVol').textContent = fmt(last.volume);
  }

  document.getElementById('dataCount').textContent = `${data.length} nến được tải`;
  document.getElementById('lastUpdate').textContent = `Cập nhật: ${new Date().toLocaleString('vi-VN')}`;
  computeStats(data);
}

function setupTimeScaleSync() {
  const all = [mainChart, ...Object.values(macdCharts)];
  let syncing = false;
  all.forEach(src => {
    src.timeScale().subscribeVisibleLogicalRangeChange(range => {
      if (syncing || !range) return;
      syncing = true;
      all.forEach(t => { if (t !== src) t.timeScale().setVisibleLogicalRange(range); });
      syncing = false;
    });
  });
}

function setupCrosshairInfoUpdate() {
  mainChart.subscribeCrosshairMove(param => {
    if (!param.time || !param.seriesData) return;
    const cd = param.seriesData.get(candleSeries), vd = param.seriesData.get(volumeSeries);
    if (cd) {
      const up = cd.close >= cd.open;
      const el = document.getElementById('currentPrice');
      el.textContent = fmt(cd.close); el.className = 'current-price ' + (up ? 'price-up' : 'price-down');
      document.getElementById('infoOpen').textContent = fmt(cd.open);
      document.getElementById('infoHigh').textContent = fmt(cd.high);
      document.getElementById('infoLow').textContent = fmt(cd.low);
      document.getElementById('infoClose').textContent = fmt(cd.close);
    }
    if (vd) document.getElementById('infoVol').textContent = fmt(vd.value);
  });
}

async function fetchData(limit) {
  const res = await fetch(`/api/btcjpy/latest?limit=${limit}`);
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  return res.json();
}

async function loadData() {
  document.getElementById('loading').classList.remove('hidden');
  document.getElementById('errorBanner').style.display = 'none';
  try {
    const result = await fetchData(currentLimit);
    updateCharts(result.data);
    mainChart.timeScale().fitContent();
    Object.values(macdCharts).forEach(c => c.timeScale().fitContent());
  } catch (err) {
    console.error(err);
    document.getElementById('errorBanner').textContent = `Lỗi tải dữ liệu: ${err.message}`;
    document.getElementById('errorBanner').style.display = 'block';
  } finally {
    document.getElementById('loading').classList.add('hidden');
  }
}

function handleResize() {
  const w = getChartWidth();
  mainChart.applyOptions({ width: w, height: getMainChartHeight() });
  Object.values(macdCharts).forEach(c => c.applyOptions({ width: w, height: getMacdChartHeight() }));
}

// ==========================================
//  INIT
// ==========================================

function init() {
  initMainChart();
  ['5m', '1h', '4h', '1d'].forEach(id => initMacdChart(id, document.getElementById(`macd${id.replace('m','m').replace('h','h').replace('d','d')}Chart`)));

  setupTimeScaleSync();
  setupCrosshairInfoUpdate();

  document.querySelectorAll('.btn[data-limit]').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.btn[data-limit]').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentLimit = parseInt(btn.dataset.limit);
      loadData();
    });
  });

  document.getElementById('refreshBtn').addEventListener('click', loadData);
  document.getElementById('replayBtn').addEventListener('click', toggleReplay);
  window.addEventListener('resize', handleResize);
  loadData();
  fetchFullDatasetForRegions();

  let countdown = 60;
  const cdEl = document.getElementById('autoRefreshCountdown');
  setInterval(() => {
    countdown--;
    if (cdEl) cdEl.textContent = `⏳ ${countdown}s`;
    if (countdown <= 0) {
      countdown = 60;
      loadData();
    }
  }, 1000);
}

init();
</script>
